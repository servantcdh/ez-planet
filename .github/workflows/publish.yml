name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@ez-planet'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish labeling-canvas
        run: npm publish --workspace=@ez-planet/labeling-canvas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish cosmos-canvas
        run: npm publish --workspace=@ez-planet/cosmos-canvas
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
