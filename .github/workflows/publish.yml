name: Publish Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: rm -f package-lock.json && npm install --no-package-lock

      - name: Build packages
        run: npm run build

      - name: Publish labeling-canvas
        run: npm publish --workspace=@servantcdh/ez-planet-labeling
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SERVANTCDH }}

      - name: Publish cosmos-canvas
        run: npm publish --workspace=@servantcdh/ez-planet-cosmos
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_SERVANTCDH }}
